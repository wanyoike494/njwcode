<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Django Calculator</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="calcuatorCSS.css">
</head>
<body>

  <header>
    <h1>Python Calculator</h1>
    <p>Powered by Django Backend · Secure API</p>
  </header>

  <div class="calculator" role="main" aria-label="Calculator">

    <div class="display">
      <div class="loader-bar" id="loaderBar"></div>
      <div class="status-badge" id="statusBadge">Waiting…</div>
      <div class="expression" id="expression" aria-live="polite"></div>
      <div class="result"     id="result"     aria-live="assertive">0</div>
    </div>

    <div class="btn-grid" id="btnGrid">
      <!-- Row 1 -->
      <button class="btn clear"  data-action="clear">AC</button>
      <button class="btn func"   data-action="sign">+/−</button>
      <button class="btn func"   data-action="percent">%</button>
      <button class="btn op"     data-action="op" data-op="/">÷</button>

      <!-- Row 2 -->
      <button class="btn"        data-action="num" data-val="7">7</button>
      <button class="btn"        data-action="num" data-val="8">8</button>
      <button class="btn"        data-action="num" data-val="9">9</button>
      <button class="btn op"     data-action="op" data-op="*">×</button>

      <!-- Row 3 -->
      <button class="btn"        data-action="num" data-val="4">4</button>
      <button class="btn"        data-action="num" data-val="5">5</button>
      <button class="btn"        data-action="num" data-val="6">6</button>
      <button class="btn op"     data-action="op" data-op="-">−</button>

      <!-- Row 4 + equals spanning rows 4&5 -->
      <button class="btn"        data-action="num" data-val="1">1</button>
      <button class="btn"        data-action="num" data-val="2">2</button>
      <button class="btn"        data-action="num" data-val="3">3</button>
      <button class="btn equals" data-action="equals">=</button>

      <!-- Row 5 -->
      <button class="btn zero"   data-action="num" data-val="0">0</button>
      <button class="btn"        data-action="decimal">.</button>
      <button class="btn op"     data-action="op" data-op="+">+</button>
    </div>

  </div>

  <footer>
    Calculations handled by <span>Python / Django</span> · Frontend by HTML/CSS/JS
  </footer>

  <script src="calculatorJS.js"></script>
</body>
</html>
