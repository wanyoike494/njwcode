<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Clock</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;800&display=swap"rel="stylesheet"/>
    <style>
        *{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
            font-family: "Poppins", sans-serif;
        }
        body {
            height: 100vh;
            background-image: linear-gradient(135deg, #ffecd2, #fcb69f)
        }
        /*----------------------------------navigation bar------------------------------------------------------------------------*/
        .navigationBar {
            width: 100%;
            padding: 1em 1.5em;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .navigationLeft {
            display: flex;
            gap: 1.5em;
            margin-left: auto;

        }

        .navigationLeft a {
            text-decoration: none;
            color: #150c41;
            font-weight: 700;
        }
        .logo {
            font-weight: 800;
            font-size: 1.4em;
            color: #150c41;
            text-decoration: none;
        }
        .logo a {
            text-decoration: none;
            color: #e3193b;
        }
        .logo-main {
            color: #150c41;
        }
        .logo-accent {
            color: #1956e3;
            margin-left: 0.3em;
            


        }
    
        /* Hover effects */

        .logo a:hover{
            color: #1956e3;
        }
        .logo a {
            transition: color 0.3s ease;
        }

        .navigationLeft a {
            transition: color 0.3s ease;
        }

        .navigationLeft a:hover {
            color: #1956e3;
        }

        /* Hamburger hidden on desktop */
        .hamburger {
            display: none;
            font-size: 2em;
            cursor: pointer;
        }
        /* MOBILE */
        @media (max-width: 600px) {
            .navigationLeft {
                position: absolute;
                top: 70px;
                left: 0;
                width: 100%;
                background: #ffffff;
                flex-direction: column;
                align-items: center;
                gap: 1em;
                padding: 1em 0;
                display: none;
                box-shadow: 0 1em 2em rgba(0,0,0,0.2);
                font-weight: 200;
                font-size: 1.1em;
            }
            .navigationLeft.active {
                display: flex;
            }

            .hamburger {
                display: block;
            }
        }

        /*---------------------------------clock----------------------------------------------------------------------------------*/
        .clock{
            width: 31.25em;
            height: 8em;
            position: absolute;
            transform: translate(-50%, -50%);
            top: 50%;
            left: 50%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-weight: 600;
        }
        .clock div {
            position: relative;
            background-color: #ffffff;
            height: 100%;
            width: 3.2em;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5em;
            color: #150c41;
            border-radius: 0.4em;
            box-shadow: 0 1em 2em rgba(0, 0, 0, 0.3);
            letter-spacing: 0.05em;
        }
        .clock span {
            font-weight: 800;
            font-size: 2.5em;
            color: #ffffff;
        }
        /* Mobile responsiveness */
        @media (max-width: 600px) {
            .clock {
                width: 90%;
                height: 5.5em;
            }

            .clock div {
                width: 2.5em;
                font-size: 1.8em;
            }

            .clock span {
                font-size: 1.8em;
            }
        }

        /* Very small screens */
        @media (max-width: 360px) {
            .clock {
                height: 4.8em;
            }

            .clock div {
                width: 2.2em;
                font-size: 1.5em;
            }

            .clock span {
                font-size: 1.5em;
            }
        }
        /*-----------------------------------------------------Footer css----------------------------------------------------*/
        .footer {
            width: 100%;
            position: absolute;
            bottom: 1em;
            text-align: center;
            font-size: 0.9em;
            color: #150c41;
        }

        .footer a {
            color: #1956e3;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .footer a:hover {
            color: #150c41;
        }


       


    </style>
</head>
<body>
    <nav class ="navigationBar">
        <div class="logo">
            <!-- <a href="https://www.josephwanyoike.com/njw_dev"><span class="logo-accent">NJW Dev</span></a> -->
            <a href="https://josephwanyoike.com/NJW_DEV/index.html">NJW Dev</a>
            <span class="logo-main">Digital Clock</span>
            
        </div>

        <div  class="navigationLeft">
            <a href="https://www.worlddataanalysis.com">World Data Analysis</a>
            <a href="https://www.josephwanyoike.com">Joseph Wanyoike</a>
        </div>
        
        <div class="hamburger" id="hamburger">☰</div>
    </nav>
    <div class="clock">
        <div id="hour"></div>
        <span>:</span>
        <div id="minute"></div>
        <span>:</span>
        <div id="seconds"></div>
    </div>

    <!-- ------------------------------------footer-------------------------------------------------------------------------- -->
    <footer class="footer">
        <p>
            © <span id="year"></span>
            <a href="https://www.josephwanyoike.com" target="_blank">
                Joseph Wanyoike Njoroge
            </a>
            . All rights reserved.
        </p>
    </footer>

    <script>

        const hamburger = document.getElementById("hamburger");
        const navLeft = document.querySelector(".navigationLeft");

        hamburger.addEventListener("click", () => {
            navLeft.classList.toggle("active");
        });

        const hour = document.getElementById("hour");
        const minute = document.getElementById("minute");
        const seconds = document.getElementById("seconds");

        const clock = setInterval(function time(){
            const dateNow = new Date();
            let hr = dateNow.getHours();
            let min = dateNow.getMinutes();
            let sec = dateNow.getSeconds();

            //console.log(hr, min, sec);
            hr = hr.toString().padStart(2, "0");
            min = min.toString().padStart(2, "0");
            sec = sec.toString().padStart(2, "0");

            const timeString = `${hr}:${min}:${sec}`;
            hour.textContent = hr;
            minute.textContent = min;
            seconds.textContent = sec;
        }, 1000);

        document.getElementById("year").textContent = new Date().getFullYear();

            
    </script>

</body>
</html>
