<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        *{
            padding: 0;
            margin: 0;
            box-sizing: box-radius;
            font-family: 'Open Sans', 'sans-serif';
 
        }
        body{
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #E3F2FD;
        }
    </style>
</head>
<body>
    <div id="wrapper" class="w-[65vmin] h-[70vmin] bg-[#293447] rounded-[10px] flex flex-col overflow-hidden">
        <div id="game-details" class="text-[#B8C6DC] text-[1.2rem] font-medium px-[27px] py-[20px] flex justify-between">
>
            <span id="score">Score: 15</span>
            <span id="high-score">High Score: 30</span>

        </div>
        <class id="play-board" class="w-full h-full grid [grid-template-columns:repeat(30,1fr)] [grid-template-rows:repeat(30,1fr)] bg-[#212837]">
    </div>
 
<script scr="script.js"></script>
</body>
</html>
